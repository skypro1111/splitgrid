<!--
  Favicon / web tile — same artwork as the packaged app icon (build/icon.svg):
  black tile with the "S" (< over >) cut through it. Used as the browser/PWA
  favicon where a solid tile reads better than the bare mark.
-->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="arrow-cutout">
      <rect x="0" y="0" width="512" height="512" fill="white" />
      <text x="256" y="212.875" font-family="Arial, sans-serif" font-size="445"
        font-weight="900" fill="black" text-anchor="middle" dominant-baseline="middle">&lt;</text>
      <text x="256" y="382.875" font-family="Arial, sans-serif" font-size="445"
        font-weight="900" fill="black" text-anchor="middle" dominant-baseline="middle">&gt;</text>
    </mask>
  </defs>
  <rect x="0" y="0" width="512" height="512" fill="black" mask="url(#arrow-cutout)" />
</svg>
